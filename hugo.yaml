baseURL: https://observerw.github.io/
canonifyURLs: true
languageCode: zh-cn
title: oldspaper
theme: ['PaperMod']

markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
          - - \$
            - \$
        enable: true
params:
  math: true
  comments: true
  homeInfoParams:
    Title: 对酒当歌 人生几何
    Content: 譬如朝露 去日苦多

  socialIcons: # optional
    - name: "github"
      url: "https://github.com/observerw"