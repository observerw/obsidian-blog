baseURL: https://observerw.github.io/
canonifyURLs: true
languageCode: en-us
title: My New Hugo Site
theme: ['PaperMod']

markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
          - - \$
            - \$
        enable: true
params:
  math: true